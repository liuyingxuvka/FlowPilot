contract_version: 1
change: harden-flowpilot-repair-dossier-testmesh

obligations:
  - id: req.repair_dossier.active_owner
    source: "specs/repair-dossier-context/spec.md#Requirement: Runtime owns active repair dossiers"
    claim: Runtime creates and updates one active repair dossier per substantive repair lineage.
    required: true
    evidence:
      - check.unit.repair_dossier_context
      - check.flowguard.blocker_repair_information_flow
  - id: req.repair_dossier.role_scoped_authorization
    source: "specs/repair-dossier-context/spec.md#Requirement: Repair packets receive role-scoped dossier context"
    claim: PM, worker, reviewer, and FlowGuard repair packets receive the dossier reads required for their role while normal packets remain minimally authorized.
    required: true
    evidence:
      - check.unit.repair_dossier_context
      - check.unit.information_flow_alignment
      - check.flowguard.project_control_information_flow
  - id: req.repair_dossier.context_only
    source: "specs/repair-dossier-context/spec.md#Requirement: Historical repair bodies are context-only by default"
    claim: Prior repair bodies can guide repair but cannot close current evidence obligations.
    required: true
    evidence:
      - check.unit.repair_dossier_context
      - check.unit.core_runtime
  - id: req.repair_testmesh.cartesian
    source: "specs/repair-cartesian-testmesh/spec.md#Requirement: Repair validation uses a Cartesian TestMesh"
    claim: The repair validation mesh enumerates required dimensions and blocks hidden skipped, stale, progress-only, or failed child evidence.
    required: true
    evidence:
      - check.flowguard.repair_dossier_testmesh
      - check.unit.repair_dossier_testmesh
  - id: req.repair_testmesh.observed_replay
    source: "specs/repair-cartesian-testmesh/spec.md#Requirement: Observed repair-loop replay is required"
    claim: The observed repair-loop pattern is replayed and reaches break-glass at the fifth same-parent repair node.
    required: true
    evidence:
      - check.unit.observed_repair_loop_replay
  - id: req.blocker_policy.fixed_next_actions
    source: "specs/blocker-repair-policy/spec.md#Requirement: Fixed blocker next actions are enforced"
    claim: Fixed blocker-class next actions are hard gates, not advisory prompt text.
    required: true
    evidence:
      - check.unit.blocker_next_action_routing
      - check.unit.core_runtime
  - id: req.break_glass.five_repair_nodes
    source: "specs/controller-break-glass-repair/spec.md#Requirement: Five same-parent repair nodes without recovery enter break-glass"
    claim: Five consecutive same-parent repair nodes in one dossier without normal recovery enters break-glass and prevents further ordinary repair.
    required: true
    evidence:
      - check.unit.break_glass_depth
      - check.unit.observed_repair_loop_replay
  - id: req.review.current_subject
    source: "specs/flowpilot-packet-review-flow/spec.md#Requirement: Reviewer repair checks bind to current subject and dossier"
    claim: Reviewer checks receive repair dossier context, use the current review window as the stage authority, allow PM plan-stage review when only a plan is due, and reject plan-as-evidence or wrong-subject FlowGuard evidence for worker/result-stage closure.
    required: true
    evidence:
      - check.unit.repair_dossier_context
      - check.flowguard.repair_dossier_testmesh
      - check.unit.reviewer_subject_alignment
      - check.unit.information_flow_alignment
  - id: req.alignment.model_code_test
    source: "specs/flowguard-boundary-test-alignment/spec.md#Requirement: Repair dossier obligations bind model, code, and tests"
    claim: Repair dossier obligations bind to owner code and current executable tests, and installed-copy proof is produced after sync.
    required: true
    evidence:
      - check.flowguard.model_test_alignment
      - check.install.sync
      - check.install.audit
      - check.install.self_check

checks:
  - id: check.unit.repair_dossier_context
    kind: command
    command: python
    args:
      - -m
      - pytest
      - tests/test_flowpilot_repair_dossier_context.py
      - -q
    required: true
    covers:
      - req.repair_dossier.active_owner
      - req.repair_dossier.role_scoped_authorization
      - req.repair_dossier.context_only
      - req.review.current_subject
    expected:
      exit_code: 0
  - id: check.unit.repair_dossier_testmesh
    kind: command
    command: python
    args:
      - -m
      - pytest
      - tests/test_flowpilot_repair_dossier_testmesh.py
      - -q
    required: true
    covers:
      - req.repair_testmesh.cartesian
      - req.review.current_subject
    expected:
      exit_code: 0
  - id: check.unit.observed_repair_loop_replay
    kind: command
    command: python
    args:
      - -m
      - pytest
      - tests/test_flowpilot_observed_repair_loop_replay.py
      - -q
    required: true
    covers:
      - req.repair_testmesh.observed_replay
      - req.break_glass.five_repair_nodes
    expected:
      exit_code: 0
  - id: check.unit.blocker_next_action_routing
    kind: command
    command: python
    args:
      - -m
      - pytest
      - tests/test_flowpilot_blocker_next_action_routing.py
      - -q
    required: true
    covers:
      - req.blocker_policy.fixed_next_actions
    expected:
      exit_code: 0
  - id: check.unit.break_glass_depth
    kind: command
    command: python
    args:
      - -m
      - pytest
      - tests/test_flowpilot_break_glass_depth.py
      - -q
    required: true
    covers:
      - req.break_glass.five_repair_nodes
    expected:
      exit_code: 0
  - id: check.unit.reviewer_subject_alignment
    kind: command
    command: python
    args:
      - -m
      - pytest
      - tests/test_flowpilot_reviewer_subject_alignment.py
      - -q
    required: true
    covers:
      - req.review.current_subject
    expected:
      exit_code: 0
  - id: check.unit.core_runtime
    kind: command
    command: python
    args:
      - -m
      - pytest
      - tests/test_flowpilot_core_runtime.py
      - -q
    required: true
    covers:
      - req.repair_dossier.context_only
      - req.blocker_policy.fixed_next_actions
    expected:
      exit_code: 0
  - id: check.unit.information_flow_alignment
    kind: command
    command: python
    args:
      - -m
      - pytest
      - tests/test_flowpilot_information_flow_alignment.py
      - -q
    required: true
    covers:
      - req.repair_dossier.role_scoped_authorization
      - req.review.current_subject
    expected:
      exit_code: 0
  - id: check.flowguard.repair_dossier_testmesh
    kind: command
    command: python
    args:
      - simulations/run_flowpilot_repair_dossier_testmesh_checks.py
      - --json
      - --write
    required: true
    covers:
      - req.repair_testmesh.cartesian
      - req.review.current_subject
    expected:
      exit_code: 0
  - id: check.flowguard.blocker_repair_information_flow
    kind: command
    command: python
    args:
      - simulations/run_flowpilot_blocker_repair_information_flow_checks.py
      - --json-out
      - simulations/flowpilot_blocker_repair_information_flow_results.json
    required: true
    covers:
      - req.repair_dossier.active_owner
    expected:
      exit_code: 0
  - id: check.flowguard.project_control_information_flow
    kind: command
    command: python
    args:
      - simulations/run_flowpilot_project_control_information_flow_checks.py
      - --json-out
      - simulations/flowpilot_project_control_information_flow_results.json
    required: true
    covers:
      - req.repair_dossier.role_scoped_authorization
    expected:
      exit_code: 0
  - id: check.flowguard.model_test_alignment
    kind: command
    command: python
    args:
      - simulations/run_flowpilot_model_test_alignment_checks.py
      - --json-out
      - simulations/flowpilot_model_test_alignment_results.json
    required: true
    covers:
      - req.alignment.model_code_test
    expected:
      exit_code: 0
  - id: check.topology.build
    kind: command
    command: python
    args:
