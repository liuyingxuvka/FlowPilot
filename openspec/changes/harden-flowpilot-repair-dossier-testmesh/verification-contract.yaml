    required: true
    covers:
      - req.alignment.model_code_test
    expected:
      exit_code: 0
  - id: check.install.sync
    kind: command
    command: python
    args:
      - scripts/install_flowpilot.py
      - --sync-repo-owned
      - --json
    required: true
    covers:
      - req.alignment.model_code_test
    expected:
      exit_code: 0
  - id: check.install.audit
    kind: command
    command: python
    args:
      - scripts/audit_local_install_sync.py
      - --json
    required: true
    covers:
      - req.alignment.model_code_test
    expected:
      exit_code: 0
  - id: check.install.self_check
    kind: command
    command: python
    args:
      - scripts/check_install.py
      - --json
    required: true
    covers:
      - req.alignment.model_code_test
    expected:
      exit_code: 0

freshness:
  watch:
    - openspec/changes/harden-flowpilot-repair-dossier-testmesh/proposal.md
    - openspec/changes/harden-flowpilot-repair-dossier-testmesh/design.md
    - openspec/changes/harden-flowpilot-repair-dossier-testmesh/tasks.md
    - openspec/changes/harden-flowpilot-repair-dossier-testmesh/specs/**/*.md
    - openspec/changes/harden-flowpilot-repair-dossier-testmesh/verification-contract.yaml
    - skills/flowpilot/assets/flowpilot_core_runtime/**/*.py
