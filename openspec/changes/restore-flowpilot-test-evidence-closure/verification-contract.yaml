  - id: check.execution_closure.model
    kind: command
    command: python
    args: [simulations/run_flowpilot_ai_response_execution_closure_checks.py, --mode, adversarial, --budget-seconds, "3600", --json-out, simulations/flowpilot_ai_response_execution_closure_results.json]
    required: true
    covers: [req.coverage.universe, req.coverage.oracles, req.coverage.parent_receipts, req.coverage.truthful_counts, req.testmesh.execution_evidence, req.testmesh.parent_consumption, req.mta.binding, req.mta.backfeed, req.tiers.background_final, req.release.predecessor_disposition]
