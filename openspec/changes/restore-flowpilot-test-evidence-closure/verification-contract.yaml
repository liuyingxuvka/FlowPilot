  - id: check.acceptance_testmesh
    kind: receipt
    execution_owner: test_tier.evidence_closure.acceptance_testmesh_current_evidence
    consumer: restore-test-evidence-closure-acceptance-testmesh
    receipt_path: simulations/flowpilot_acceptance_testmesh_results.json
    depends_on_receipts: [check.tier.evidence_closure.background, check.evidence.final_manifest]
    required: true
    covers: [req.testmesh.execution_evidence, req.testmesh.parent_consumption, req.tiers.background_final]
  - id: check.model_mesh
    kind: command
    command: python
    args: [simulations/run_flowpilot_model_mesh_checks.py, --evidence-manifest, simulations/flowpilot_acceptance_testmesh_evidence_manifest.json, --claim-scope, done, --json-out, simulations/flowpilot_model_mesh_results.json]
    depends_on_receipts: [check.evidence.final_manifest, check.behavior_commitment_risk.model, check.model_test_alignment, check.acceptance_testmesh]
    required: true
    covers: [req.coverage.parent_receipts, req.testmesh.parent_consumption]
