  - id: check.layered_boundary
    kind: command
    command: python
    args: [simulations/flowpilot_layered_boundary_proof.py, --json-out, simulations/flowpilot_layered_boundary_proof_results.json]
    required: true
    covers: [req.coverage.parent_receipts]
    expected: {exit_code: 0}
  - id: check.tier.final.background
    kind: command
    command: python
    args: [scripts/run_test_tier.py, --tier, final-confidence, --verify-background, --background-dir, tmp/test_background/v0.12.1-final-confidence-v4-seed-r1, --json]
    execution_owner: receipt_consumer.tier.final_confidence
    depends_on_receipts: [check.contract_exhaustion.model, check.current_matrix.model, check.model_test_alignment, check.acceptance_testmesh, check.model_mesh]
    required: true
    covers: [req.testmesh.parent_consumption, req.tiers.background_final, req.release.current_closure]
    expected: {exit_code: 0}
  - id: check.meta.background
    kind: receipt
    execution_owner: receipt_consumer.parent.meta
    consumer: restore-test-evidence-closure-meta-parent
    receipt_path: simulations/flowpilot_acceptance_testmesh_evidence_manifest.json
    depends_on_receipts: [check.tier.release.background, check.evidence.final_manifest]
    required: true
    covers: [req.testmesh.parent_consumption, req.release.current_closure]
  - id: check.capability.background
    kind: receipt
    execution_owner: receipt_consumer.parent.capability
    consumer: restore-test-evidence-closure-capability-parent
    receipt_path: simulations/flowpilot_acceptance_testmesh_evidence_manifest.json
    depends_on_receipts: [check.tier.release.background, check.evidence.final_manifest]
    required: true
    covers: [req.testmesh.parent_consumption, req.release.current_closure]
  - id: check.testmesh.known_bad
