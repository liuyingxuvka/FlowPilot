  - id: check.tier.release.background
    kind: command
    command: python
    args: [scripts/run_test_tier.py, --tier, release, --verify-background, --background-dir, tmp/test_background/v0.12.1-release-v4-seed-r1, --json]
    execution_owner: receipt_consumer.tier.release
    required: true
    covers: [req.testmesh.parent_consumption, req.tiers.background_final, req.release.current_closure]
    expected: {exit_code: 0}
  - id: check.evidence.preclosure_manifest
    kind: command
    command: python
    args: [scripts/compile_flowpilot_acceptance_testmesh_evidence.py, --phase, preclosure, --all-root, tmp/test_background/v0.12.1-all-v4-seed-r1, --adversarial-root, tmp/test_background/v0.12.1-adversarial-v4-seed-r1, --release-root, tmp/test_background/v0.12.1-release-v4-seed-r1, --json-out, tmp/test_results/flowpilot_acceptance_testmesh_preclosure_manifest.json]
    depends_on_receipts: [check.unified_repair.exact_native_receipt, check.tier.all.background, check.tier.adversarial.background, check.tier.release.background]
    required: true
    covers: [req.coverage.parent_receipts, req.testmesh.execution_evidence, req.testmesh.parent_consumption, req.tiers.background_final, req.execution.owner_scoped_evidence_applicability]
    expected: {exit_code: 0}
  - id: check.tier.evidence_closure.background
    kind: command
    command: python
    args: [scripts/run_test_tier.py, --tier, evidence-closure, --verify-background, --background-dir, tmp/test_background/v0.12.1-evidence-closure-v4-seed-r1, --json]
    execution_owner: receipt_consumer.tier.evidence_closure
    depends_on_receipts: [check.evidence.preclosure_manifest]
    required: true
    covers: [req.coverage.universe, req.coverage.oracles, req.mta.binding, req.testmesh.parent_consumption, req.release.current_closure]
    expected: {exit_code: 0}
  - id: check.evidence.final_manifest
    kind: command
    command: python
    args: [scripts/compile_flowpilot_acceptance_testmesh_evidence.py, --phase, final, --all-root, tmp/test_background/v0.12.1-all-v4-seed-r1, --adversarial-root, tmp/test_background/v0.12.1-adversarial-v4-seed-r1, --release-root, tmp/test_background/v0.12.1-release-v4-seed-r1, --closure-root, tmp/test_background/v0.12.1-evidence-closure-v4-seed-r1, --json-out, simulations/flowpilot_acceptance_testmesh_evidence_manifest.json]
    depends_on_receipts: [check.tier.evidence_closure.background]
    required: true
    covers: [req.coverage.parent_receipts, req.testmesh.execution_evidence, req.testmesh.parent_consumption, req.tiers.background_final, req.execution.owner_scoped_evidence_applicability, req.release.current_closure]
    expected: {exit_code: 0}
