  - id: check.unified_repair.exact_native_receipt
    kind: receipt
    execution_owner: native.unified_repair.exact_runtime_tests
    consumer: restore-test-evidence-closure-exact-native-projection
    receipt_path: simulations/flowpilot_unified_repair_exact_native_test_owner_results.json
    required: true
    covers: [req.testmesh.execution_evidence, req.testmesh.parent_consumption, req.release.current_closure]
  - id: check.tier.all.background
    kind: command
    command: python
    args: [scripts/run_test_tier.py, --tier, all, --verify-background, --background-dir, tmp/test_background/v0.12.1-all-v4-seed-r1, --json]
    execution_owner: receipt_consumer.tier.all
