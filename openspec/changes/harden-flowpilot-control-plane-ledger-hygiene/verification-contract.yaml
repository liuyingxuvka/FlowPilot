contract_version: 1
change: harden-flowpilot-control-plane-ledger-hygiene
obligations:
  - id: req.control.accepted_pointer
    source: "specs/flowpilot-control-plane-contract-kernel/spec.md#Requirement: Accepted result pointers only reference formally accepted results"
    claim: Dirty accepted_result_id pointers are mechanically rejected by runtime consumers.
    required: true
    evidence:
      - check.runtime.accepted_pointer_regressions
      - check.flowguard.control_surface
  - id: req.control.assignment_repair
    source: "specs/flowpilot-control-plane-contract-kernel/spec.md#Requirement: Assignment repair cannot resurrect dirty accepted packets"
    claim: Assignment repair refuses review-blocked accepted-result targets.
    required: true
    evidence:
      - check.runtime.accepted_pointer_regressions
      - check.synthetic.databank_trace
  - id: req.control.pm_flowguard_acceptance
    source: "specs/flowpilot-control-plane-contract-kernel/spec.md#Requirement: PM FlowGuard absorption waits for review before acceptance"
    claim: PM FlowGuard acceptance does not write accepted_result_id before formal review/system acceptance.
    required: true
    evidence:
      - check.runtime.pm_flowguard_acceptance
      - check.high_standard.pm_flowguard_acceptance
  - id: req.review.final_authorization
    source: "specs/flowpilot-packet-review-flow/spec.md#Requirement: Final Reviewer packets receive sealed result authorization"
    claim: Final/backward Reviewer packets are issued with required authorized_result_reads.
    required: true
    evidence:
      - check.runtime.final_reviewer_auth
      - check.synthetic.databank_trace
  - id: req.repair.identity
    source: "specs/blocker-repair-policy/spec.md#Requirement: Repair-chain derived packets preserve blocker identity"
    claim: Repair blocker identity is preserved from gate to PM FlowGuard acceptance and review packets.
    required: true
    evidence:
      - check.runtime.repair_identity
      - check.flowguard.blocker_repair
  - id: req.breakglass.closure
    source: "specs/controller-break-glass-repair/spec.md#Requirement: Open break-glass artifacts block clean completion"
    claim: Open incidents and pending permanent-fix patches block closure and terminal return.
    required: true
    evidence:
      - check.runtime.breakglass_closure
      - check.flowguard.breakglass
      - check.flowguard.runtime_closure
  - id: req.terminal.whole_ledger
    source: "specs/terminal-ledger/spec.md#Requirement: Terminal return consumes whole-ledger hygiene"
    claim: Final closure/terminal return scans stale active blockers and dirty pointers across the ledger.
    required: true
    evidence:
      - check.runtime.terminal_hygiene
      - check.flowguard.recursive_closure
  - id: req.synthetic.cartesian
    source: "specs/synthetic-agent-coverage-matrix/spec.md#Requirement: Fake-AI coverage includes control-plane ledger hygiene axes"
    claim: Fake-AI/D-card matrix covers all finite control-plane ledger hygiene axes with expected runtime reactions.
    required: true
    evidence:
      - check.fake_ai.cartesian_matrix
      - check.flowguard.cartesian_exhaustion
      - check.synthetic.coverage_matrix
  - id: req.synthetic.databank_replay
    source: "specs/end-to-end-synthetic-agent-chaos-replay/spec.md#Requirement: Synthetic replay covers observed DataBank control-plane miss"
    claim: The observed DataBank failure chain is replayed without needing private run files.
    required: true
    evidence:
      - check.historical.databank_fixture
      - check.synthetic.databank_trace
checks:
  - id: check.runtime.accepted_pointer_regressions
    kind: command
    command: python
    args:
      - -m
      - unittest
      - tests.test_flowpilot_core_runtime.FlowPilotCoreRuntimeTests.test_dirty_accepted_result_pointer_blocks_assignment_repair_and_terminal_hygiene
    required: true
    covers:
      - req.control.accepted_pointer
      - req.control.assignment_repair
    expected:
      exit_code: 0
  - id: check.runtime.pm_flowguard_acceptance
    kind: command
    command: python
    args:
      - -m
      - unittest
      - tests.test_flowpilot_core_runtime.FlowPilotCoreRuntimeTests.test_pm_flowguard_acceptance_waits_for_review_before_accepted_pointer
    required: true
    covers:
      - req.control.pm_flowguard_acceptance
    expected:
      exit_code: 0
  - id: check.high_standard.pm_flowguard_acceptance
    kind: command
    command: python
    args:
      - -m
      - unittest
      - tests.test_flowpilot_high_standard_control_flow.FlowPilotHighStandardControlFlowTests.test_pm_flowguard_acceptance_accept_decision_reaches_reviewer_without_early_acceptance
    required: true
    covers:
      - req.control.pm_flowguard_acceptance
    expected:
      exit_code: 0
  - id: check.runtime.repair_identity
    kind: command
    command: python
    args:
      - -m
      - unittest
      - tests.test_flowpilot_core_runtime.FlowPilotCoreRuntimeTests.test_pm_flowguard_acceptance_packet_inherits_gate_repair_blocker_identity
    required: true
    covers:
      - req.repair.identity
    expected:
      exit_code: 0
  - id: check.runtime.breakglass_closure
    kind: command
    command: python
    args:
      - -m
      - unittest
      - tests.test_flowpilot_core_runtime.FlowPilotCoreRuntimeTests.test_final_closure_blocks_open_break_glass_incident_and_pending_patch
    required: true
    covers:
      - req.breakglass.closure
      - req.terminal.whole_ledger
    expected:
      exit_code: 0
  - id: check.runtime.terminal_hygiene
