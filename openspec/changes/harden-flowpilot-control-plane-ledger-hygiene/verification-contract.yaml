    covers:
      - req.terminal.whole_ledger
    expected:
      exit_code: 0
  - id: check.runtime.final_reviewer_auth
    kind: command
    command: python
    args:
      - -m
      - unittest
      - tests.test_flowpilot_core_runtime.FlowPilotCoreRuntimeTests.test_final_reviewer_node_task_receives_authorized_evidence_bundle
    required: true
    covers:
      - req.review.final_authorization
    expected:
      exit_code: 0
  - id: check.historical.databank_fixture
    kind: command
    command: python
    args:
      - -m
      - unittest
      - tests.test_flowpilot_historical_live_run_replay.FlowPilotHistoricalLiveRunReplayTests.test_run_20260707_databank_control_plane_miss_fixture_is_rejected
    required: true
    covers:
      - req.synthetic.databank_replay
    expected:
      exit_code: 0
  - id: check.synthetic.databank_trace
    kind: command
    command: python
    args:
      - -m
      - unittest
      - tests.test_flowpilot_synthetic_agent_trace_replay.FlowPilotSyntheticExceptionTraceReplayTests.test_databank_control_plane_miss_trace_rejects_dirty_acceptance_and_empty_final_review_auth
    required: true
    covers:
      - req.control.assignment_repair
      - req.review.final_authorization
      - req.synthetic.databank_replay
    expected:
      exit_code: 0
  - id: check.fake_ai.cartesian_matrix
    kind: command
    command: python
    args:
      - -m
      - unittest
      - tests.test_flowpilot_fake_ai_runtime_replay.FlowPilotFakeAIRuntimeReplayTests.test_control_plane_ledger_hygiene_fake_ai_matrix_is_cartesian
    required: true
    covers:
      - req.synthetic.cartesian
    expected:
      exit_code: 0
  - id: check.synthetic.coverage_matrix
