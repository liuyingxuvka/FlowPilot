[pytest]
testpaths = tests
norecursedirs =
    .git
    .pytest_cache
    .flowguard
    .flowpilot
    backups
    tmp
    kb
markers =
    fast: focused checks intended for routine foreground validation
    router: router runtime child-suite checks
    integration: install, sync, smoke, and coverage checks
    release: public-boundary or release-only checks
    background: long checks intended for detached execution with artifacts
    legacy: legacy full-regression checks that are never part of the fast tier
